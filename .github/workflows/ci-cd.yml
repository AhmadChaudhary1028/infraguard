name: InfraGuard CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v3

      - name: Docker image build
        run: docker build -t infraguard:${{ github.sha }} .

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: infraguard:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to DockerHub
        run: |
          docker tag infraguard:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/infraguard:latest
          docker tag infraguard:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/infraguard:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/infraguard:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/infraguard:${{ github.sha }}
